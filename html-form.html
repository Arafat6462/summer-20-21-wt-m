<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>HTML Form</title>
</head>
<body>

	<h1>HTML Form</h1>

	<!-- form -->

	<form action="form-submit.php" method="POST" autocomplete="off" novalidate> <!-- target="_blank" -->
		<!-- Elements inside form
			1. input (button, number, password, date, color, checkbox, radio, range, search, submit, text, hidden, file, month, week, tel, email, ...)
			2. label
			3. select
			4. textarea
			5. option
			6. fieldset
			7. legend
			8. button
			9. datalist
			10. output
			11. optgroup
		 -->
		
		<label for="fname">First Name:</label>
		<input type="text" id="fname" name="fname">

		<br><br>

		<label for="lname">Last Name:</label>
		<input type="text" id="lname" name="lname">

		<br><br>

		<label for="email">Email:</label>
		<input type="email" id="email" name="email">

		<br><br>

		<input type="radio" id="male" name="gender" value="male">
		<label for="male">Male</label>
		<br>
		<input type="radio" id="female" name="gender" value="female">
		<label for="female">Female</label>
		<br>
		<input type="radio" id="other" name="gender" value="other">
		<label for="other">Other</label>

		<br><br>

		<input type="checkbox" id="jsc" name="jsc" value="jsc">
		<label for="jsc">JSC</label>
		<input type="checkbox" id="ssc" name="ssc" value="ssc">
		<label for="ssc">SSC</label>
		<input type="checkbox" id="hsc" name="hsc" value="hsc">
		<label for="hsc">HSC</label>

		<br><br>

		<label for="city">City:</label>
		<select id="city" name="city"> <!-- multiple -->
			<option value="" selected></option>
			<option value="dhaka">Dhaka</option>
			<option value="chattagram">Chattagram</option>
			<option value="sylhet">Sylhet</option>
		</select>

		<br><br>

		<label for="comemnt">Comment:</label>
		<textarea id="comment" name="comment" rows="10" cols="20"></textarea>

		<br><br>

		<input type="submit" name="submit" value="Submit">
		
	</form>

</body>
</html>
